<nav style="background-color: #2c3e50; padding: 10px;">
  <ul style="list-style: none; margin: 0; padding: 0; display: flex; align-items: center; gap: 20px;">
    
    <!-- Inicio -->
    <li>
      <a href="{% url 'ia:inicio' %}" style="color: white; text-decoration: none;">Inicio</a>
    </li>

    <!-- Formulario de búsqueda -->
    <li>
      <form method="GET" action="{% url 'ia:busqueda' %}" style="display: flex; align-items: center; gap: 5px;">
        <input type="text" name="q" placeholder="Buscar IAs..." style="padding: 5px;">
        <button type="submit" style="padding: 5px;">Buscar</button>
      </form>
    </li>

    <!-- Submenú de Categorías -->
    <li style="position: relative;">
      <span style="color: white; cursor: pointer;">Categorías IA ▼</span>
      <ul style="position: absolute; top: 30px; left: 0; background-color: #34495e; padding: 10px; list-style: none; display: none;" id="submenu">
        <li><a href="{% url 'ia:texto' %}" style="color: white; text-decoration: none;">Texto</a></li>
        <li><a href="{% url 'ia:ppt' %}" style="color: white; text-decoration: none;">PPT</a></li>
        <li><a href="{% url 'ia:matematicas' %}" style="color: white; text-decoration: none;">Matemáticas</a></li>
        <li><a href="{% url 'ia:programacion' %}" style="color: white; text-decoration: none;">Programación</a></li>
        <li><a href="{% url 'ia:imagenes' %}" style="color: white; text-decoration: none;">Imágenes</a></li>
        <li><a href="{% url 'ia:mapas-mentales' %}" style="color: white; text-decoration: none;">Mapas mentales</a></li>
      </ul>
    </li>
  </ul>
</nav>

<script>
  // Mostrar y ocultar el submenú con JavaScript simple
  const submenuTrigger = document.querySelector("nav li span");
  const submenu = document.getElementById("submenu");

  submenuTrigger.addEventListener("mouseover", () => submenu.style.display = "block");
  submenuTrigger.addEventListener("mouseout", () => submenu.style.display = "none");
  submenu.addEventListener("mouseover", () => submenu.style.display = "block");
  submenu.addEventListener("mouseout", () => submenu.style.display = "none");
</script>
